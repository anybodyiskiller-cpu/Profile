#========= 基础设置 ========#
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
unified-delay: true
tcp-concurrent: true
disable-icmp-forwarding: true
disable-udp: false


#========= DNS ========#
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "msftconnecttest.com"
    - "xbox.*.microsoft.com"
    - "*.xboxlive.com"
    - "+.market.xiaomi.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
    - "time.*.com"
    - "ntp.*.com"
    - "localhost.ptlogin2.qq.com"
    
  hosts:
    # 常见广告域名
    'ad.douyin.com': 0.0.0.0
    'ad.xiaomi.com': 0.0.0.0
    'ads.qq.com': 0.0.0.0
    'adtrack.weibo.com': 0.0.0.0
    'ad.toutiao.com': 0.0.0.0
    'gslb.doubanio.com': 0.0.0.0
    'stats.weibo.com': 0.0.0.0
    'analytics.163.com': 0.0.0.0
    'adservice.google.com': 0.0.0.0
    'pagead2.googlesyndication.com': 0.0.0.0
    
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.alidns.com/dns-query
    
  nameserver-policy:
    # 国际广告联盟
    "*.doubleclick.net": '0.0.0.0'
    "*.googleadservices.com": '0.0.0.0'
    "*.googlesyndication.com": '0.0.0.0'
    "*.google-analytics.com": '0.0.0.0'
    "*.googletagmanager.com": '0.0.0.0'
    "*.googletagservices.com": '0.0.0.0'
    "*.youtubeads.com": '0.0.0.0'
    "*.fbcdn.net": '0.0.0.0'
    "*.amazon-adsystem.com": '0.0.0.0'
    "*.adsrvr.org": '0.0.0.0'
    "*.admob.com": '0.0.0.0'
    "*.adservice.google.com": '0.0.0.0'
    "*.adservice.google.com.hk": '0.0.0.0'
    "*.adservice.google.com.tw": '0.0.0.0'

    # 国内广告联盟
    "*.gdt.qq.com": '0.0.0.0'
    "*.gdtimg.com": '0.0.0.0'
    "*.mmstat.com": '0.0.0.0'
    "*.tanx.com": '0.0.0.0'
    "*.pangle.com": '0.0.0.0'
    "*.pangolin-sdk-toutiao.com": '0.0.0.0'
    "*.baidustatic.com": '0.0.0.0'
    "*.cpro.baidu.com": '0.0.0.0'
