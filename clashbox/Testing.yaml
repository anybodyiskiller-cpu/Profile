      - 240.0.0.0/4


#========= 锚点定义 ========#
# 节点提供者
provider: &provider
  type: http
  interval: 86400
  health-check:
    enable: true
    url: http://www.gstatic.com/generate_204
    interval: 1800

# 规则集类型
domain: &domain
  type: http
  behavior: domain
  interval: 86400

classical: &classical
  type: http
  behavior: classical
  interval: 86400

ipcidr: &ipcidr
  type: http
  behavior: ipcidr
  interval: 86400

# 策略组类型（单订阅只写Sub，多订阅如下累加）
auto: &auto
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 900
  use: [Sub1, Sub2]

select: &select
  type: select
  use: [Sub1, Sub2]

# 节点地区分组状态（true=隐藏，false=显示）
hide: &hide true


#========= 订阅链接 ========#
proxy-providers:
  Sub1:
    <<: *provider
    url: "https://resgghdjsjjsjs.com"
    # 此处填入你的订阅1链接
    path: ./proxy_providers/sub1.yaml

  Sub2:
    <<: *provider
    url: "https://apidisjointed.com"
    # 此处填入你的订阅2链接
    path: ./proxy_providers/sub2.yaml
    
    
