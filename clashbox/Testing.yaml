    "*.beacon.163.com": '0.0.0.0'
    "*.log.163.com": '0.0.0.0'
    "*.monitor.163.com": '0.0.0.0'
    "*.stat.163.com": '0.0.0.0'
    "*.tracking.163.com": '0.0.0.0'
