mixed-port: 7893
mode: rule
allow-lan: true
bind-address: "*"
tcp-concurrent: true
unified-delay: true
log-level: info
ipv6: true
profile:
  store-selected: true
  store-fake-ip: true
external-ui-name: zashboard
external-ui: ui
external-controller: 0.0.0.0:9090
secret: ""
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip
tun:
  enable: true
  stack: system
  dns-hijack: ['0.0.0.0:53']
  auto-detect-interface: true
  auto-route: true
  auto-redirect: true
  strict-route: false
  endpoint-independent-nat: true
sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    QUIC:
      ports: [443]
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  force-domain:
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - "+.apple.com"
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: false
  fake-ip-filter:
    - '*.lan'
    - rule-set:cn_domain
  default-nameserver:
    - 114.114.114.114
    - tls://223.5.5.5:853
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
