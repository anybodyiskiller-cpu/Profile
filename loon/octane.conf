GlobalMedia = select,Singapore,Japan,United States,HongKong,Taiwan,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ForeignMedia.png
UHD = select,Japan,Singapore,DIRECT,img-url = https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/06jichang/UHD.png
Netflix = select,Singapore,Taiwan,HongKong,img-url = https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/Netflix.png
YouTube = select,Singapore,Japan,HongKong,Taiwan,United States,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/YouTube.png
Google = select,Singapore,Japan,HongKong,img-url = https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/Google.png
TikTok = select,Singapore,Japan,United States,Taiwan,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/TikTok.png
Telegram = select,Singapore,Japan,United States,HongKong,Taiwan,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/Telegram.png
Instagram = select,HongKong,Singapore,Japan,Taiwan,img-url = https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/Instagram.png
Apple = select,DIRECT,Taiwan,Japan,United States,Singapore,img-url = https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/apple(1).png
X = select,Singapore,Taiwan,Japan,United States,img-url = https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/X.png
Shop = select,DIRECT,Japan,United States,img-url = https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/shop.png
Spotify = select,Japan,Singapore,DIRECT,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/luestr/IconResource/main/App_icon/120px/Spotify.png
# > OpenAI
AI = select,Singapore,Japan,United States,HongKong,Taiwan,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/AppleIntelligence.png
# Mainland策略-国内访问
# Advertising策略-去广告
United States = url-test,美国,url = http://cp.cloudflare.com/generate_204,interval = 600,img-url = https://gitlab.com/lodepuly/iconlibrary/-/raw/main/Flag_icon/120px/US.png
Japan = load-balance,日本,url = http://cp.cloudflare.com/generate_204,interval = 600,max-timeout = 3000,algorithm = pcc,img-url = https://gitlab.com/lodepuly/iconlibrary/-/raw/main/Flag_icon/120px/JP.png
Taiwan = url-test,台湾,url = http://cp.cloudflare.com/generate_204,interval = 600,img-url = https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/taiwan(2).png
# FINAL策略：如果以上的策略均未被匹配到，则听从此策略组的规定
Singapore = url-test,新加坡,url = http://cp.cloudflare.com/generate_204,interval = 600,img-url = https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/singapore(2).png
HongKong = url-test,香港,url = http://cp.cloudflare.com/generate_204,interval = 600,img-url = https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/01Country/Hongkong(2).png
Mainland = select,DIRECT,Singapore,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png
Advertising = select,DIRECT,REJECT,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Advertising.png
FINAL = select,DIRECT,Singapore,Japan,url = http://cp.cloudflare.com/generate_204,img-url = https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

