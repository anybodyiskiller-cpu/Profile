all-hybrid = false
# > IPv6 ж”ҜжҢҒпјҲй»ҳи®Өе…ій—ӯпјү
ipv6 = false
# > жөӢиҜ•и¶…ж—¶пјҲз§’пјү
test-timeout = 2
# > Internet жөӢиҜ• URL
internet-test-url = http://www.baidu.com
# > д»ЈзҗҶжөӢйҖҹ URL
proxy-test-url = http://www.google.com/generate_204
# > GeoIPж•°жҚ®еә“
