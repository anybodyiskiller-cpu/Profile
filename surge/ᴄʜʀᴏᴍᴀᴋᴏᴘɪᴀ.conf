use-local-host-item-for-proxy = true
wifi-access-http-port = 1118
wifi-access-socks5-port = 1118
ipv6-vif = disabled
allow-hotspot-access = true
http-api = 1118@0.0.0.0:6166
http-api-tls = false
external-controller-access = 1118@0.0.0.0:6171
include-all-networks = false
proxy-restricted-to-lan = false
include-apns = true
encrypted-dns-server = https://doh.pub/dns-query, https://dns.alidns.com/dns-query
http-listen = 0.0.0.0
socks5-listen = 0.0.0.0
include-local-networks = true
include-cellular-services = true
tun-excluded-routes = 239.255.255.250/32 #!IOS-ONLY

