ipv6 = false
# > жөӢиҜ•и¶…ж—¶пјҲз§’пјү
test-timeout = 2
# > Internet жөӢиҜ• URL
internet-test-url = http://www.baidu.com
# > д»ЈзҗҶжөӢйҖҹ URL
